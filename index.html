<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Voltage Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      background: radial-gradient(ellipse at center, #0b0c29 0%, #1b1b3a 100%);
      color: #ffffff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 40px;
      font-size: 2rem;
      color: #00ffff;
      text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
      position: relative;
      z-index: 1;
    }

    /* Card style */
    .card {
      background: rgba(10, 10, 30, 0.85);
      width: 350px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px #00ffff;
      border: 1px solid #00ffff;
      position: relative;
      z-index: 1;
    }

    .voltage {
      font-size: 2rem;
      font-weight: bold;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
      margin-top: 10px;
    }

    .label {
      font-size: 1.2rem;
      color: #aad4f5;
      margin-bottom: 15px;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #aad4f5;
    }

    /* Extra boxes for additional metrics */
    .metrics-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0;
    }

    .metric-box {
      background: rgba(10, 10, 30, 0.85);
      border: 1px solid #00ffff;
      border-radius: 15px;
      width: 150px;
      padding: 20px;
      box-shadow: 0 0 15px #00ffff;
    }

    .metric-value {
      font-size: 2rem;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      margin-top: 5px;
    }

    .metric-label {
      font-size: 1rem;
      color: #aad4f5;
    }

    /* Graph container */
    .graph-container {
      width: 90%;
      max-width: 700px;
      margin: 30px auto;
      background: rgba(10, 10, 30, 0.85);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #00ffff;
      box-shadow: 0 0 25px #00ffff;
    }
  </style>
</head>

<body>

  <h1>🚀 3 Phase Voltage Monitor</h1>

  <div class="card">
    <div class="label">Current Voltage</div>
    <div class="voltage" id="voltage">Loading...</div>
  </div>

  <!-- Phase metric boxes -->
  <div class="metrics-container">
    <div class="metric-box">
      <div class="metric-label">R Phase</div>
      <div class="metric-value" id="min-voltage">--</div>
    </div>
    <div class="metric-box">
      <div class="metric-label">Y Phase</div>
      <div class="metric-value" id="max-voltage">--</div>
    </div>
    <div class="metric-box">
      <div class="metric-label">B Phase</div>
      <div class="metric-value" id="avg-voltage">--</div>
    </div>
  </div>

  <!-- Graph -->
  <div class="graph-container">
    <canvas id="voltageChart"></canvas>
  </div>

  <div class="footer">Be careful: Handled safely on AC Voltage</div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDAqh3q7mnXvSRFomXb6stowrrn0d-Gkk4",
      authDomain: "voltagemonitoring-2d0fb.firebaseapp.com",
      databaseURL: "https://voltagemonitoring-2d0fb-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "voltagemonitoring-2d0fb",
      storageBucket: "voltagemonitoring-2d0fb.firebasestorage.app",
      messagingSenderId: "155185881469",
      appId: "1:155185881469:web:3c96f8cf67ff3459fcec14"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();
    const voltageElement = document.getElementById("voltage");

    // References to each phase in Firebase
    const rRef = db.ref("/VoltageMonitor/R_Phase");
    const yRef = db.ref("/VoltageMonitor/Y_Phase");
    const bRef = db.ref("/VoltageMonitor/B_Phase");

    // Phase values
    let r = 0, y = 0, b = 0;

    // Graph data arrays
    let timeLabels = [];
    let rData = [];
    let yData = [];
    let bData = [];

    // Chart.js setup for all 3 phases
    const ctx = document.getElementById('voltageChart').getContext('2d');
    const voltageChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: timeLabels,
        datasets: [
          { label: 'R Phase', data: rData, borderColor: '#ff0000', backgroundColor: 'rgba(255,0,0,0.2)', tension: 0.3, fill: true },
          { label: 'Y Phase', data: yData, borderColor: '#ffff00', backgroundColor: 'rgba(255,255,0,0.2)', tension: 0.3, fill: true },
          { label: 'B Phase', data: bData, borderColor: '#0000ff', backgroundColor: 'rgba(0,0,255,0.2)', tension: 0.3, fill: true }
        ]
      },
      options: {
        responsive: true,
        scales: {
          x: { ticks: { color: '#aad4f5' }, grid: { color: 'rgba(0,255,255,0.1)' } },
          y: { ticks: { color: '#aad4f5' }, grid: { color: 'rgba(0,255,255,0.1)' } }
        },
        plugins: { legend: { labels: { color: '#aad4f5' } } }
      }
    });

    // Function to update metric boxes
    function updatePhaseBoxes() {
      document.getElementById("min-voltage").innerText = r + " V"; // R Phase
      document.getElementById("max-voltage").innerText = y + " V"; // Y Phase
      document.getElementById("avg-voltage").innerText = b + " V"; // B Phase

      voltageElement.innerText = `R: ${r} V | Y: ${y} V | B: ${b} V`;

      const now = new Date().toLocaleTimeString();
      // Update chart arrays
      if(timeLabels.length>20){
        timeLabels.shift(); rData.shift(); yData.shift(); bData.shift();
      }
      timeLabels.push(now);
      rData.push(r);
      yData.push(y);
      bData.push(b);
      voltageChart.update();
    }

    // Listen to Firebase changes
    rRef.on("value", snap => { r = snap.val(); updatePhaseBoxes(); });
    yRef.on("value", snap => { y = snap.val(); updatePhaseBoxes(); });
    bRef.on("value", snap => { b = snap.val(); updatePhaseBoxes(); });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Voltage Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      background: radial-gradient(ellipse at center, #0b0c29 0%, #1b1b3a 100%);
      color: #ffffff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 40px;
      font-size: 2rem;
      color: #00ffff;
      text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
      position: relative;
      z-index: 1;
    }

    /* Card style */
    .card {
      background: rgba(10, 10, 30, 0.85);
      width: 350px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px #00ffff;
      border: 1px solid #00ffff;
      position: relative;
      z-index: 1;
    }

    .voltage {
      font-size: 3rem;
      font-weight: bold;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
      margin-top: 10px;
    }

    .label {
      font-size: 1.2rem;
      color: #aad4f5;
      margin-bottom: 15px;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #aad4f5;
    }

    /* Extra boxes for additional metrics */
    .metrics-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0;
    }

    .metric-box {
      background: rgba(10, 10, 30, 0.85);
      border: 1px solid #00ffff;
      border-radius: 15px;
      width: 150px;
      padding: 20px;
      box-shadow: 0 0 15px #00ffff;
    }

    .metric-value {
      font-size: 2rem;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      margin-top: 5px;
    }

    .metric-label {
      font-size: 1rem;
      color: #aad4f5;
    }

    /* Graph container */
    .graph-container {
      width: 90%;
      max-width: 700px;
      margin: 30px auto;
      background: rgba(10, 10, 30, 0.85);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #00ffff;
      box-shadow: 0 0 25px #00ffff;
    }
  </style>
</head>

<body>

  <h1>🚀 Voltage Monitor</h1>

  <div class="card">
    <div class="label">Current Voltage</div>
    <div class="voltage" id="voltage">Loading...</div>
  </div>

  <!-- Extra metric boxes -->
  <div class="metrics-container">
    <div class="metric-box">
      <div class="metric-label">Min Voltage</div>
      <div class="metric-value" id="min-voltage">--</div>
    </div>
    <div class="metric-box">
      <div class="metric-label">Max Voltage</div>
      <div class="metric-value" id="max-voltage">--</div>
    </div>
    <div class="metric-box">
      <div class="metric-label">Average Voltage</div>
      <div class="metric-value" id="avg-voltage">--</div>
    </div>
  </div>

  <!-- Graph -->
  <div class="graph-container">
    <canvas id="voltageChart"></canvas>
  </div>

  <div class="footer">Be careful: Handled safely on AC Voltage</div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDAqh3q7mnXvSRFomXb6stowrrn0d-Gkk4",
      authDomain: "voltagemonitoring-2d0fb.firebaseapp.com",
      databaseURL: "https://voltagemonitoring-2d0fb-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "voltagemonitoring-2d0fb",
      storageBucket: "voltagemonitoring-2d0fb.firebasestorage.app",
      messagingSenderId: "155185881469",
      appId: "1:155185881469:web:3c96f8cf67ff3459fcec14"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();
    const voltageRef = db.ref("/VoltageMonitor/voltage");
    const voltageElement = document.getElementById("voltage");

    // Array for graph data
    let voltageData = [];
    let timeLabels = [];

    // Metrics
    let minVoltage = null;
    let maxVoltage = null;
    let sumVoltage = 0;
    let count = 0;

    // Chart.js setup
    const ctx = document.getElementById('voltageChart').getContext('2d');
    const voltageChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: timeLabels,
        datasets: [{
          label: 'Voltage (V)',
          data: voltageData,
          borderColor: '#00ffff',
          backgroundColor: 'rgba(0,255,255,0.2)',
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        scales: {
          x: { 
            ticks: { color: '#aad4f5' },
            grid: { color: 'rgba(0,255,255,0.1)' }
          },
          y: { 
            ticks: { color: '#aad4f5' },
            grid: { color: 'rgba(0,255,255,0.1)' }
          }
        },
        plugins: {
          legend: { labels: { color: '#aad4f5' } }
        }
      }
    });

    voltageRef.on("value", (snapshot) => {
      const voltage = snapshot.val();
      const now = new Date().toLocaleTimeString();

      if (voltage !== null) {
        voltageElement.innerText = voltage + " V";

        // Update metrics
        if (minVoltage === null || voltage < minVoltage) minVoltage = voltage;
        if (maxVoltage === null || voltage > maxVoltage) maxVoltage = voltage;
        sumVoltage += voltage;
        count++;
        const avgVoltage = (sumVoltage / count).toFixed(2);

        document.getElementById('min-voltage').innerText = minVoltage + " V";
        document.getElementById('max-voltage').innerText = maxVoltage + " V";
        document.getElementById('avg-voltage').innerText = avgVoltage + " V";

        // Update graph
        if (voltageData.length > 20) { // keep last 20 readings
          voltageData.shift();
          timeLabels.shift();
        }
        voltageData.push(voltage);
        timeLabels.push(now);
        voltageChart.update();
      } else {
        voltageElement.innerText = "No Data";
      }
    });
  </script>
</body>
</html>
